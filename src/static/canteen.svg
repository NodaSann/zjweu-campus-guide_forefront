<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <!-- 食堂建筑主体 -->
  <rect x="30" y="30" width="140" height="50" fill="#9CB4CC" />
  <!-- 屋顶 -->
  <rect x="25" y="20" width="150" height="10" fill="#6A87AD" />
  <!-- 门 -->
  <rect x="85" y="55" width="30" height="25" fill="#4A6585" />
  <!-- 窗户 -->
  <rect x="40" y="40" width="20" height="15" fill="#B8D0E6" />
  <rect x="70" y="40" width="20" height="15" fill="#B8D0E6" />
  <rect x="110" y="40" width="20" height="15" fill="#B8D0E6" />
  <rect x="140" y="40" width="20" height="15" fill="#B8D0E6" />
  <!-- 食堂标志 -->
  <rect x="85" y="25" width="30" height="10" fill="#ffffff" />
  <text x="90" y="33" font-family="Arial" font-size="8" fill="#333333">食堂</text>
  <!-- 餐桌 -->
  <rect x="45" y="80" width="20" height="10" fill="#B8D0E6" />
  <rect x="90" y="80" width="20" height="10" fill="#B8D0E6" />
  <rect x="135" y="80" width="20" height="10" fill="#B8D0E6" />
</svg>